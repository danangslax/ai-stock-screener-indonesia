name: Trade Audit

# ======================================
# TRIGGERS
# ======================================

on:
  # ======================================
  # SCHEDULE
  #
  # WIB SCHEDULE:
  #
  # 08:00 WIB = 01:00 UTC
  # 22:00 WIB = 15:00 UTC
  # 01:00 WIB = 18:00 UTC
  #
  # Monday - Friday
  # ======================================

  schedule:
    - cron: "0 1 * * 1-5"

    - cron: "0 15 * * 1-5"

    - cron: "0 18 * * 1-5"

  # ======================================
  # MANUAL RUN
  # ======================================

  workflow_dispatch:

# ======================================
# JOBS
# ======================================

jobs:
  run-trade-audit:
    runs-on: ubuntu-latest

    timeout-minutes: 30

    # ======================================
    # NODE.JS 24
    # ======================================

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ======================================
      # CHECKOUT REPOSITORY
      # ======================================

      - name: Checkout repository

        uses: actions/checkout@v4

      # ======================================
      # SETUP PYTHON
      # ======================================

      - name: Setup Python

        uses: actions/setup-python@v5

        with:
          python-version: "3.11"

          cache: "pip"

      # ======================================
      # INSTALL DEPENDENCIES
      # ======================================

      - name: Install dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

      # ======================================
      # RUN TRADE AUDIT
      # ======================================

      - name: Run Trade Audit

        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}

          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

        run: |

          python -m runners.trade_audit_runner
