name: Night Screener

# ======================================
# TRIGGERS
# ======================================

on:
  # ======================================
  # SCHEDULE
  #
  # 19:00 WIB = 12:00 UTC
  # Monday - Friday
  # ======================================

  schedule:
    - cron: "0 12 * * 1-5"

  # ======================================
  # MANUAL RUN
  # ======================================

  workflow_dispatch:

# ======================================
# JOBS
# ======================================

jobs:
  run-screener:
    runs-on: ubuntu-latest

    timeout-minutes: 45

    # ======================================
    # ENVIRONMENT
    # ======================================

    env:
      PYTHONUNBUFFERED: 1

      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # ======================================
    # STEPS
    # ======================================

    steps:
      # ======================================
      # CHECKOUT REPOSITORY
      # ======================================

      - name: Checkout repository

        uses: actions/checkout@v4

      # ======================================
      # SETUP PYTHON
      # ======================================

      - name: Setup Python

        uses: actions/setup-python@v5

        with:
          python-version: "3.11"

          cache: "pip"

      # ======================================
      # VERIFY PYTHON
      # ======================================

      - name: Verify Python

        run: |

          python --version

          pip --version

      # ======================================
      # INSTALL DEPENDENCIES
      # ======================================

      - name: Install dependencies

        run: |

          python -m pip install --upgrade pip setuptools wheel

          pip install -r requirements.txt

      # ======================================
      # CREATE REQUIRED DIRECTORIES
      # ======================================

      - name: Create directories

        run: |

          mkdir -p data/cache
          mkdir -p data/snapshots
          mkdir -p logs
          mkdir -p backups

      # ======================================
      # DOWNLOAD MARKET DATA
      # ======================================

      - name: Download Market Data

        run: |

          python -m app.runners.download_market_data

      # ======================================
      # BUILD MARKET SNAPSHOT
      # ======================================

      - name: Build Market Snapshot

        run: |

          python -m app.runners.build_market_snapshot

      # ======================================
      # RUN AI SCREENER
      # ======================================

      - name: Run AI Screener

        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}

          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

        run: |

          python -m app.runners.auto_screener

      # ======================================
      # UPLOAD LOGS
      # ======================================

      - name: Upload Logs

        if: always()

        uses: actions/upload-artifact@v4

        with:
          name: screener-logs

          path: |
            logs/
            data/snapshots/

          retention-days: 7
